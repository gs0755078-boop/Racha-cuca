<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Racha Cuca</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d12;
    --surface: #16161f;
    --border: #2a2a3a;
    --accent: #7efff5;
    --accent2: #ff6b8a;
    --accent3: #ffe066;
    --text: #eeeef5;
    --muted: #666680;
    --tile-bg: #1e1e2e;
    --gap: 5px;
    --radius: 14px;
    --tile-radius: 10px;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: max(env(safe-area-inset-top), 10px) 12px max(env(safe-area-inset-bottom), 10px);
    height: 100dvh;
  }

  body::before {
    content: '';
    position: fixed;
    top: -20vh; left: 50%;
    transform: translateX(-50%);
    width: 80vw; height: 50vh;
    background: radial-gradient(ellipse, rgba(126,255,245,0.07) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  .header {
    text-align: center;
    padding-top: 4px;
    margin-bottom: 6px;
    position: relative; z-index: 1;
    flex-shrink: 0;
  }

  .title {
    font-size: clamp(1.5rem, 7vw, 2.2rem);
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 60%, var(--accent3) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 2px;
  }

  .subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .stats {
    display: flex;
    gap: 28px;
    margin-bottom: 8px;
    position: relative; z-index: 1;
    flex-shrink: 0;
  }

  .stat { text-align: center; }

  .stat-value {
    font-family: 'DM Mono', monospace;
    font-size: 1.25rem;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.5rem;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .size-selector {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 3px;
    gap: 2px;
    margin-bottom: 8px;
    position: relative; z-index: 1;
    flex-shrink: 0;
    max-width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .size-selector::-webkit-scrollbar { display: none; }

  .size-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    padding: 7px 11px;
    border-radius: 50px;
    cursor: pointer;
    white-space: nowrap;
    min-height: 36px;
    -webkit-tap-highlight-color: transparent;
    transition: color 0.15s;
  }
  .size-btn.active {
    background: var(--accent);
    color: #0d0d12;
    font-weight: 700;
  }

  /* ── Board ── */
  .puzzle-wrapper {
    position: relative; z-index: 1;
    flex-shrink: 0;
    touch-action: none;
  }

  .puzzle-board {
    display: grid;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: 0 0 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(126,255,245,0.04);
    touch-action: none;
    position: relative;
    overflow: hidden;
  }

  .tile {
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--tile-bg);
    border: 1px solid var(--border);
    border-radius: var(--tile-radius);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    color: var(--text);
    position: absolute; /* absolute for free dragging */
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    cursor: grab;
    will-change: transform;
    transition: box-shadow 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    user-select: none;
  }

  .tile::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 60%);
    pointer-events: none;
    border-radius: inherit;
  }

  .tile.empty {
    background: rgba(126,255,245,0.02);
    border: 1.5px dashed rgba(126,255,245,0.12);
    cursor: default;
    box-shadow: inset 0 0 24px rgba(0,0,0,0.4);
    z-index: 0 !important;
  }
  .tile.empty::before { display: none; }

  .tile.correct {
    background: linear-gradient(135deg, #192a1b, #152018);
    border-color: rgba(80, 200, 100, 0.28);
    color: #68ee82;
  }

  .tile.dragging {
    cursor: grabbing;
    border-color: rgba(126,255,245,0.5);
    box-shadow: 0 8px 30px rgba(126,255,245,0.2);
    z-index: 50 !important;
  }

  .tile-num {
    position: relative; z-index: 1;
    line-height: 1;
    pointer-events: none;
  }

  /* ── Actions ── */
  .action-bar {
    display: flex;
    gap: 10px;
    margin-top: 9px;
    position: relative; z-index: 1;
    flex-shrink: 0;
    width: 100%;
    max-width: 420px;
  }

  .btn {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    padding: 13px 10px;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 0.3px;
    min-height: 48px;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.1s, background 0.1s;
  }
  .btn:active { transform: scale(0.94); }
  .btn.primary { background: var(--accent); color: #0d0d12; border-color: var(--accent); }
  .btn.primary:active { background: #5ef5eb; }

  .hint {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    color: var(--muted);
    letter-spacing: 1px;
    text-align: center;
    margin-top: 7px;
    position: relative; z-index: 1;
    flex-shrink: 0;
    transition: opacity 0.6s ease;
  }

  /* ── Win ── */
  .win-overlay {
    position: fixed; inset: 0;
    background: rgba(13,13,18,0.94);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 32px;
  }
  .win-overlay.visible { opacity: 1; pointer-events: all; }

  .win-title {
    font-size: clamp(2.2rem, 11vw, 4rem);
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 60%, var(--accent3) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 18px;
    text-align: center;
    animation: pop 1.6s ease-in-out infinite;
  }
  @keyframes pop { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }

  .win-stats {
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    margin-bottom: 32px;
    font-size: 0.9rem;
    text-align: center;
    line-height: 2.4;
  }
  .win-stats span { color: var(--accent); }

  .win-btn {
    background: var(--accent); color: #0d0d12;
    border: none; font-family: 'Syne', sans-serif;
    font-size: 1rem; font-weight: 800;
    padding: 17px 52px; border-radius: 50px;
    cursor: pointer; min-height: 56px;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.1s;
  }
  .win-btn:active { transform: scale(0.95); }

  .confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 99; overflow: hidden; }
  .confetti-piece {
    position: absolute;
    animation: fall linear forwards;
  }
  @keyframes fall {
    0%   { transform: translateY(-10px) rotate(0deg); opacity:1; }
    85%  { opacity:1; }
    100% { transform: translateY(110vh) rotate(750deg); opacity:0; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="title">Racha Cuca</div>
  <div class="subtitle">Sliding Puzzle</div>
</div>

<div class="stats">
  <div class="stat">
    <div class="stat-value" id="movesVal">0</div>
    <div class="stat-label">Movimentos</div>
  </div>
  <div class="stat">
    <div class="stat-value" id="timeVal">0:00</div>
    <div class="stat-label">Tempo</div>
  </div>
</div>

<div class="size-selector" id="sizeSelector">
  <button class="size-btn" data-size="3">3×3</button>
  <button class="size-btn active" data-size="4">4×4</button>
  <button class="size-btn" data-size="5">5×5</button>
  <button class="size-btn" data-size="6">6×6</button>
  <button class="size-btn" data-size="7">7×7</button>
  <button class="size-btn" data-size="8">8×8</button>
</div>

<div class="puzzle-wrapper">
  <div class="puzzle-board" id="board"></div>
</div>

<div class="action-bar">
  <button class="btn primary" id="shuffleBtn">🔀 Embaralhar</button>
  <button class="btn" id="solveBtn">✨ Resolver</button>
</div>

<div class="hint" id="hint">Arraste uma fila de peças em direção ao espaço vazio</div>

<div class="win-overlay" id="winOverlay">
  <div class="win-title">🎉 Você venceu!</div>
  <div class="win-stats" id="winStats"></div>
  <button class="win-btn" id="winNewGame">Novo Jogo</button>
</div>

<div class="confetti-container" id="confettiContainer"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let size = 4;
let tiles = []; // logical grid: value at each index (0 = empty)
let emptyIdx = 0;
let moves = 0, seconds = 0;
let timerInterval = null, gameStarted = false, won = false, solving = false;
const GAP = 5;
let tileSize = 70;
let boardPad = GAP;

// DOM
const boardEl    = document.getElementById('board');
const movesVal   = document.getElementById('movesVal');
const timeVal    = document.getElementById('timeVal');
const winOverlay = document.getElementById('winOverlay');
const winStats   = document.getElementById('winStats');
const confettiEl = document.getElementById('confettiContainer');
const hintEl     = document.getElementById('hint');

// ── Tile size ──────────────────────────────────────────────────────────────
function computeTileSize() {
  const hUsed = 10 + 56 + 6 + 46 + 8 + 52 + 8 + 60 + 9 + 32 + 10;
  const avW = window.innerWidth - 24;
  const avH = window.innerHeight - hUsed;
  const avail = Math.min(avW, avH, 520);
  return Math.max(30, Math.floor((avail - (size + 1) * GAP) / size));
}

function boardPixel(idx) {
  // top-left pixel of tile at logical index
  const r = Math.floor(idx / size), c = idx % size;
  return {
    x: boardPad + c * (tileSize + GAP),
    y: boardPad + r * (tileSize + GAP)
  };
}

// ── Puzzle logic ───────────────────────────────────────────────────────────
function isSolvable(arr, n) {
  let inv = 0;
  const flat = arr.filter(v => v !== 0);
  for (let i = 0; i < flat.length - 1; i++)
    for (let j = i + 1; j < flat.length; j++)
      if (flat[i] > flat[j]) inv++;
  if (n % 2 === 1) return inv % 2 === 0;
  const er = Math.floor(arr.indexOf(0) / n);
  const fb = n - er;
  return fb % 2 === 0 ? inv % 2 === 1 : inv % 2 === 0;
}

function doShuffle() {
  let arr;
  do { arr = [...Array(size * size).keys()].sort(() => Math.random() - 0.5); }
  while (!isSolvable(arr, size) || isSolved(arr));
  return arr;
}

function isSolved(arr) {
  return arr.every((v, i) => v === (i === arr.length - 1 ? 0 : i + 1));
}

function formatTime(s) { return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }
function startTimer() {
  clearInterval(timerInterval); seconds = 0;
  timerInterval = setInterval(() => { seconds++; timeVal.textContent = formatTime(seconds); }, 1000);
}
function stopTimer() { clearInterval(timerInterval); }

// ── Render (absolute positioned tiles) ────────────────────────────────────
let tileEls = []; // tileEls[logicalIdx] = DOM element

function render() {
  tileSize = computeTileSize();
  boardPad = GAP;
  const boardSize = boardPad * 2 + size * tileSize + (size - 1) * GAP;
  boardEl.style.width  = boardSize + 'px';
  boardEl.style.height = boardSize + 'px';
  boardEl.innerHTML = '';
  tileEls = [];

  const fs = Math.max(10, Math.min(tileSize * 0.39, 36));

  for (let idx = 0; idx < size * size; idx++) {
    const val = tiles[idx];
    const el = document.createElement('div');
    el.className = 'tile' + (val === 0 ? ' empty' : '');
    if (val !== 0 && val === idx + 1) el.classList.add('correct');
    el.style.cssText = `width:${tileSize}px;height:${tileSize}px;font-size:${fs}px;z-index:1;`;

    if (val !== 0) {
      const span = document.createElement('span');
      span.className = 'tile-num';
      span.textContent = val;
      el.appendChild(span);
    }

    const pos = boardPixel(idx);
    el.style.left = pos.x + 'px';
    el.style.top  = pos.y + 'px';
    el.style.transition = 'left 0.18s cubic-bezier(0.25,0.46,0.45,0.94), top 0.18s cubic-bezier(0.25,0.46,0.45,0.94)';

    tileEls[idx] = el;
    boardEl.appendChild(el);
  }

  attachDrag();
}

// ── Drag logic ─────────────────────────────────────────────────────────────
/*
  When user touches a tile:
  1. Determine which row/col they touched
  2. Determine if empty is in same row or same col
  3. Figure out which direction the drag can go (toward empty)
  4. On drag: clamp movement, move the GROUP of tiles between touched tile and empty
  5. On release: snap — if dragged more than 50% of one tile step, commit all moves; else snap back
*/

let drag = null; // active drag state

function attachDrag() {
  for (let idx = 0; idx < size * size; idx++) {
    if (tiles[idx] === 0) continue; // skip empty
    const el = tileEls[idx];
    el.addEventListener('touchstart', e => onDragStart(e, idx), { passive: true });
  }
  // Also handle touchmove/end globally
}

document.addEventListener('touchmove', onDragMove, { passive: false });
document.addEventListener('touchend',  onDragEnd,  { passive: true  });

function onDragStart(e, touchedIdx) {
  if (won || solving || drag) return;

  const tr = Math.floor(touchedIdx / size), tc = touchedIdx % size;
  const er = Math.floor(emptyIdx / size),   ec = emptyIdx % size;

  // Determine axis and direction
  let axis = null, dir = null, groupIdxs = [];

  if (tr === er) {
    // Same row — horizontal drag possible
    axis = 'h';
    if (ec < tc) {
      // empty is to the LEFT of touched tile → can drag LEFT (toward empty)
      dir = -1;
      for (let c = ec + 1; c <= tc; c++) groupIdxs.push(tr * size + c);
    } else {
      // empty is to the RIGHT → can drag RIGHT
      dir = 1;
      for (let c = tc; c < ec; c++) groupIdxs.push(tr * size + c);
    }
  } else if (tc === ec) {
    // Same col — vertical drag possible
    axis = 'v';
    if (er < tr) {
      // empty is ABOVE → can drag UP
      dir = -1;
      for (let r = er + 1; r <= tr; r++) groupIdxs.push(r * size + tc);
    } else {
      // empty is BELOW → can drag DOWN
      dir = 1;
      for (let r = tr; r < er; r++) groupIdxs.push(r * size + tc);
    }
  }

  if (!axis) return; // not in same row/col as empty

  const step = tileSize + GAP;
  const maxMove = step * groupIdxs.length * dir; // total pixels if fully committed

  drag = {
    axis,
    dir,
    groupIdxs,       // logical indices of tiles being dragged
    step,
    startX: e.touches[0].clientX,
    startY: e.touches[0].clientY,
    offset: 0,       // current pixel offset
    maxPixels: step  // maximum drag distance (1 tile step at a time commit later)
  };

  // Lift tiles visually
  groupIdxs.forEach(i => {
    tileEls[i].classList.add('dragging');
    tileEls[i].style.transition = 'none';
    tileEls[i].style.zIndex = '20';
  });

  if (!gameStarted) {
    gameStarted = true;
    startTimer();
    hintEl.style.opacity = '0';
  }
}

function onDragMove(e) {
  if (!drag) return;
  e.preventDefault();

  const dx = e.touches[0].clientX - drag.startX;
  const dy = e.touches[0].clientY - drag.startY;
  let raw = drag.axis === 'h' ? dx : dy;

  // Only allow movement toward empty (correct direction)
  if (Math.sign(raw) !== drag.dir && raw !== 0) raw = 0;

  // Clamp: can't go further than step (one tile)
  const maxAbs = drag.step;
  raw = Math.max(-maxAbs, Math.min(maxAbs, raw));
  // Also clamp to direction
  if (drag.dir === 1)  raw = Math.max(0, raw);
  if (drag.dir === -1) raw = Math.min(0, raw);

  drag.offset = raw;

  // Move tiles
  drag.groupIdxs.forEach(i => {
    const base = boardPixel(i);
    if (drag.axis === 'h') {
      tileEls[i].style.left = (base.x + raw) + 'px';
    } else {
      tileEls[i].style.top  = (base.y + raw) + 'px';
    }
  });
}

function onDragEnd() {
  if (!drag) return;
  const { axis, dir, groupIdxs, step, offset } = drag;
  drag = null;

  const threshold = step * 0.35;
  const commit = Math.abs(offset) >= threshold;

  // Re-enable transitions
  groupIdxs.forEach(i => {
    tileEls[i].style.transition = 'left 0.18s cubic-bezier(0.25,0.46,0.45,0.94), top 0.18s cubic-bezier(0.25,0.46,0.45,0.94)';
    tileEls[i].style.zIndex = '1';
    tileEls[i].classList.remove('dragging');
  });

  if (commit) {
    // Animate to committed position, then update state
    groupIdxs.forEach(i => {
      const target = axis === 'h'
        ? boardPixel(i).x + dir * step
        : boardPixel(i).y + dir * step; // wrong — use new logical position

      // New logical position after shift
      const newIdx = axis === 'h' ? i + dir : i + dir * size;
      const newPos = boardPixel(newIdx);
      if (axis === 'h') tileEls[i].style.left = newPos.x + 'px';
      else              tileEls[i].style.top  = newPos.y + 'px';
    });

    setTimeout(() => {
      // Update logical state: shift all tiles in group toward empty
      // groupIdxs ordered from empty outward, shift one by one
      const sorted = [...groupIdxs];
      // Sort so the tile closest to empty moves first into it
      sorted.sort((a, b) => {
        if (axis === 'h') return dir === -1 ? a - b : b - a;
        else              return dir === -1 ? a - b : b - a;
      });

      sorted.forEach(i => {
        const newI = axis === 'h' ? i + dir : i + dir * size;
        tiles[newI] = tiles[i];
        tiles[i] = 0;
        emptyIdx = i;
      });
      emptyIdx = sorted[0]; // the original tile closest to empty is now the new empty... wait recalculate
      emptyIdx = tiles.indexOf(0);
      moves++;
      movesVal.textContent = moves;
      render();
      if (isSolved(tiles)) { stopTimer(); won = true; setTimeout(showWin, 350); }
    }, 190);
  } else {
    // Snap back
    groupIdxs.forEach(i => {
      const pos = boardPixel(i);
      tileEls[i].style.left = pos.x + 'px';
      tileEls[i].style.top  = pos.y + 'px';
    });
  }
}

// ── New game ───────────────────────────────────────────────────────────────
function newGame() {
  won = false; solving = false; gameStarted = false; drag = null;
  moves = 0; movesVal.textContent = '0';
  stopTimer(); timeVal.textContent = '0:00';
  tiles = doShuffle(); emptyIdx = tiles.indexOf(0);
  winOverlay.classList.remove('visible');
  confettiEl.innerHTML = '';
  hintEl.style.opacity = '0.7';
  render();
}

// ── Solve ──────────────────────────────────────────────────────────────────
function solveGame() {
  if (solving || won) return;
  solving = true;
  const goal = [...Array(size * size).keys()].map((v, i) => i === size * size - 1 ? 0 : i + 1);

  if (size === 3) {
    const gs = goal.join(','), ss = tiles.join(',');
    if (ss === gs) { solving = false; return; }
    const Q = [{ s: [...tiles], p: [] }], vis = new Set([ss]);
    let found = null;
    outer: while (Q.length) {
      const { s,
